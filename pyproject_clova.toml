[project]
name = "audio-flamingo"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "accelerate>=1.12.0",
    "bitsandbytes>=0.49.0",
    "deepspeed>=0.18.3",
    "flash-attn",
    "librosa>=0.11.0",
    "peft>=0.18.0",
    "pydub>=0.25.1",
    "wandb>=0.23.1",
    "torch>=2.6.0,<2.7.0",
    "torchaudio>=2.6.0,<2.7.0",
    "torchvision>=0.21.0,<0.22.0",
    "ms-swift==3.12.0",
    "datasets>=3.6.0",
    "msgspec>=0.19.0",
    "soundfile>=0.13.0",
    "qwen-omni-utils",
    "decord>=0.6.0"
]

[tool.uv.sources]
# PyTorch 2.6 + CUDA 12.4 用の flash-attn (Python 3.12)
flash-attn = { url = "https://github.com/Dao-AILab/flash-attention/releases/download/v2.7.4.post1/flash_attn-2.7.4.post1+cu12torch2.6cxx11abiFALSE-cp312-cp312-linux_x86_64.whl" }


[tool.uv]
override-dependencies = [
    "torch @ https://download.pytorch.org/whl/cu124/torch-2.6.0%2Bcu124-cp312-cp312-linux_x86_64.whl",
    "torchaudio @ https://download.pytorch.org/whl/cu124/torchaudio-2.6.0%2Bcu124-cp312-cp312-linux_x86_64.whl",
    "torchvision @ https://download.pytorch.org/whl/cu124/torchvision-0.21.0%2Bcu124-cp312-cp312-linux_x86_64.whl",
]